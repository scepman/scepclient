# This creates a new release on GitHub

name: Release Current .NET Core for Linux Version

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This is required for creating a release (as using 'permissions:' will reset the default rights to 'none')
      actions: read # This is required for gh run list and gh run download
    steps:
      - name: Download artifact from build workflow
        # actions/download-artifact (the official action) only works within the same workflow run.
        # Since we need artifacts from a different workflow (build-linux-core.yml) on a specific branch,
        # we use the gh CLI instead. It is pre-installed on GitHub-hosted runners and maintained
        # by GitHub, so it needs no third-party action dependency.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow build-linux-core.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "ERROR: No successful build-linux-core.yml run found on main"
            gh run list --repo "$GITHUB_REPOSITORY" --workflow build-linux-core.yml --branch main --limit 5
            exit 1
          fi
          echo "Downloading artifacts from run $run_id"
          gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --dir publish

        # Now we do not have the ZIP anymore, so we must re-zip the extracted exe
      - name: ZIP EXE for download
        run: zip --junk-paths scepclient-core-linux-x64 publish/scepclient-linux-x64/ScepClient
    
      - name: Create tag
        id: create_tag
        shell: bash
        run: |
          tag=$(date +"%Y%m%d-%H%M-linux-core")
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: ncipollo/release-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          artifacts: scepclient-core-linux-x64.zip
          tag: ${{ steps.create_tag.outputs.tag }}
          artifactContentType: application/zip
          makeLatest: false